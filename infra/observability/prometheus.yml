global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: quickbite-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["quickbite.gateway:8080"]

  - job_name: quickbite-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - quickbite.identity.api:8080
          - quickbite.catalog.api:8080
          - quickbite.orders.api:8080
          - quickbite.payments.api:8080
          - quickbite.delivery.api:8080

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
