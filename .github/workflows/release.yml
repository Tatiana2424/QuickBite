name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      promote_to:
        description: "Environment to promote after packaging"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write
  security-events: write

env:
  DOTNET_VERSION: 8.0.x
  NODE_VERSION: 20
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/quickbite-web/package-lock.json

      - name: Restore backend
        run: dotnet restore QuickBite.sln

      - name: Build backend
        run: dotnet build QuickBite.sln --configuration Release --no-restore

      - name: Test backend
        run: dotnet test QuickBite.sln --configuration Release --no-build --logger trx --results-directory TestResults

      - name: Install frontend dependencies
        working-directory: frontend/quickbite-web
        run: npm ci

      - name: Test frontend
        working-directory: frontend/quickbite-web
        run: npm test -- --run

      - name: Install Playwright browsers
        working-directory: frontend/quickbite-web
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E smoke tests
        working-directory: frontend/quickbite-web
        run: npm run test:e2e

      - name: Build frontend
        working-directory: frontend/quickbite-web
        run: npm run build

      - name: Validate Compose topology
        run: docker compose -f docker-compose.yml -f docker-compose.fullstack.yml config > release-compose.yml

      - name: Upload release validation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-validation
          path: |
            TestResults
            release-compose.yml

  dependency-scan:
    name: Dependency scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore backend
        run: dotnet restore QuickBite.sln

      - name: Generate NuGet vulnerability report
        run: dotnet list QuickBite.sln package --vulnerable --include-transitive > nuget-vulnerabilities.txt || true

      - name: Install frontend dependencies
        working-directory: frontend/quickbite-web
        run: npm ci

      - name: Generate npm audit report
        working-directory: frontend/quickbite-web
        run: npm audit --audit-level=moderate --json > npm-audit.json || true

      - name: Upload dependency scan reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-reports
          path: |
            nuget-vulnerabilities.txt
            frontend/quickbite-web/npm-audit.json

  migration-bundles:
    name: Build migration bundle (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity
            context: IdentityDbContext
            project: src/Services/Identity/QuickBite.Identity.Infrastructure/QuickBite.Identity.Infrastructure.csproj
          - service: catalog
            context: CatalogDbContext
            project: src/Services/Catalog/QuickBite.Catalog.Infrastructure/QuickBite.Catalog.Infrastructure.csproj
          - service: orders
            context: OrdersDbContext
            project: src/Services/Orders/QuickBite.Orders.Infrastructure/QuickBite.Orders.Infrastructure.csproj
          - service: payments
            context: PaymentsDbContext
            project: src/Services/Payments/QuickBite.Payments.Infrastructure/QuickBite.Payments.Infrastructure.csproj
          - service: delivery
            context: DeliveryDbContext
            project: src/Services/Delivery/QuickBite.Delivery.Infrastructure/QuickBite.Delivery.Infrastructure.csproj
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore tools
        run: dotnet tool restore

      - name: Build migration bundle
        run: >
          dotnet ef migrations bundle
          --project ${{ matrix.project }}
          --context ${{ matrix.context }}
          --configuration Release
          --output artifacts/migrations/quickbite-${{ matrix.service }}-migrate

      - name: Upload migration bundle
        uses: actions/upload-artifact@v4
        with:
          name: quickbite-${{ matrix.service }}-migration-bundle
          path: artifacts/migrations/quickbite-${{ matrix.service }}-migrate

  container-images:
    name: Build and publish image (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs:
      - validate
      - dependency-scan
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: identity-api
            dockerfile: src/Services/Identity/QuickBite.Identity.Api/Dockerfile
          - image: catalog-api
            dockerfile: src/Services/Catalog/QuickBite.Catalog.Api/Dockerfile
          - image: orders-api
            dockerfile: src/Services/Orders/QuickBite.Orders.Api/Dockerfile
          - image: payments-api
            dockerfile: src/Services/Payments/QuickBite.Payments.Api/Dockerfile
          - image: delivery-api
            dockerfile: src/Services/Delivery/QuickBite.Delivery.Api/Dockerfile
          - image: gateway
            dockerfile: src/Gateway/QuickBite.Gateway/Dockerfile
          - image: web
            dockerfile: frontend/quickbite-web/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image repository
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${REGISTRY}/${owner}/quickbite-${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=git-,format=long
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=QuickBite ${{ matrix.image }}
            org.opencontainers.image.vendor=QuickBite

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.image.outputs.name }}:git-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif

  promote-staging:
    name: Promote to staging
    runs-on: ubuntu-latest
    needs:
      - container-images
      - migration-bundles
    environment:
      name: staging
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Record staging promotion
        run: |
          echo "Promoted QuickBite ${GITHUB_SHA} to staging."
          echo "Apply migration bundles before rolling service containers."

  promote-production:
    name: Promote to production
    runs-on: ubuntu-latest
    needs: promote-staging
    environment:
      name: production
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.promote_to == 'production')
    steps:
      - name: Record production promotion
        run: |
          echo "Promoted QuickBite ${GITHUB_SHA} to production."
          echo "Use release tags and immutable git-${GITHUB_SHA} image tags for rollback."
