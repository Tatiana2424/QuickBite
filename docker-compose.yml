services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "1433:1433"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: quickbite
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  quickbite.identity.api:
    build:
      context: .
      dockerfile: src/Services/Identity/QuickBite.Identity.Api/Dockerfile
    depends_on:
      - sqlserver
      - kafka
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=QuickBiteIdentityDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True
      Jwt__Issuer: ${JWT_ISSUER:-QuickBite}
      Jwt__Audience: ${JWT_AUDIENCE:-QuickBite.Web}
      Jwt__Key: ${JWT_KEY:-quickbite-super-secret-development-key-change-me}
      Kafka__BootstrapServers: kafka:29092
    ports:
      - "5001:8080"

  quickbite.catalog.api:
    build:
      context: .
      dockerfile: src/Services/Catalog/QuickBite.Catalog.Api/Dockerfile
    depends_on:
      - sqlserver
      - kafka
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=QuickBiteCatalogDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True
      Kafka__BootstrapServers: kafka:29092
    ports:
      - "5002:8080"

  quickbite.orders.api:
    build:
      context: .
      dockerfile: src/Services/Orders/QuickBite.Orders.Api/Dockerfile
    depends_on:
      - sqlserver
      - kafka
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=QuickBiteOrdersDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True
      Kafka__BootstrapServers: kafka:29092
    ports:
      - "5003:8080"

  quickbite.payments.api:
    build:
      context: .
      dockerfile: src/Services/Payments/QuickBite.Payments.Api/Dockerfile
    depends_on:
      - sqlserver
      - kafka
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=QuickBitePaymentsDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True
      Kafka__BootstrapServers: kafka:29092
    ports:
      - "5004:8080"

  quickbite.delivery.api:
    build:
      context: .
      dockerfile: src/Services/Delivery/QuickBite.Delivery.Api/Dockerfile
    depends_on:
      - sqlserver
      - kafka
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=QuickBiteDeliveryDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True
      Kafka__BootstrapServers: kafka:29092
    ports:
      - "5005:8080"

  quickbite.gateway:
    build:
      context: .
      dockerfile: src/Gateway/QuickBite.Gateway/Dockerfile
    depends_on:
      - quickbite.identity.api
      - quickbite.catalog.api
      - quickbite.orders.api
      - quickbite.payments.api
      - quickbite.delivery.api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8080:8080"

  quickbite.web:
    build:
      context: .
      dockerfile: frontend/quickbite-web/Dockerfile
    depends_on:
      - quickbite.gateway
    ports:
      - "3000:80"
