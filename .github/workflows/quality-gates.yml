name: Quality Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore QuickBite.sln

      - name: Build
        run: dotnet build QuickBite.sln --configuration Release --no-restore

      - name: Test with coverage
        run: dotnet test QuickBite.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --logger trx --results-directory TestResults

      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: TestResults

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/quickbite-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/quickbite-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit and smoke tests
        run: npm test -- --run

      - name: Build frontend
        run: npm run build

  compose-config:
    name: Docker Compose configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose files
        run: docker compose -f docker-compose.yml -f docker-compose.fullstack.yml config
